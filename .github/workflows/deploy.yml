name: Deploy to EC2

on:
  push:
    branches: [master]
    paths:
      - 'paper_trading_bot.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'docker-compose.yml'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Install Docker if missing
            if ! command -v docker &> /dev/null; then
              sudo yum update -y
              sudo yum install -y docker
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
            fi

            # Clone if first time, otherwise pull
            if [ ! -d ~/trading-bot ]; then
              git clone https://github.com/${{ github.repository }}.git ~/trading-bot
            else
              cd ~/trading-bot
              git pull origin master
            fi

            cd ~/trading-bot

            # Create .env from secrets
            cat > .env << EOF
            ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
            ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            EOF

            # Rebuild and restart
            docker stop fvg-bot || true
            docker rm fvg-bot || true
            docker build -t trading-bot .
            docker run -d --name fvg-bot --restart unless-stopped \
              --env-file .env \
              -v $(pwd)/logs:/app/logs \
              trading-bot

            echo "Deployed at $(date)"
